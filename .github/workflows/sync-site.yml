name: Sync site content

on:
  push:
    paths:
      - 'site/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out app repo
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Check out wiki
        uses: actions/checkout@v4
        with:
          repository: culmat/information-classification.wiki
          path: wiki
          token: ${{ secrets.WIKI_DEPLOY_TOKEN }}

      - name: Sync site/ into wiki
        run: bun run scripts/sync-wiki.mjs --wiki-dir wiki

      - name: Commit and push wiki
        run: |
          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no wiki changes"
          else
            git commit -m "sync from site/ [skip ci]"
            git push
          fi

      - name: Dispatch website rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}
          repository: culm-at/culm-at.github.io
          event-type: content-updated
          client-payload: '{"source": "information-classification"}'
