name: Forge Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npx vitest run --coverage
      - run: npx @forge/cli@12 lint

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'development' || inputs.environment }}
    env:
      FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
      FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx @forge/cli@12 settings set usage-analytics true
      - name: Deploy and install
        run: |
          ENV="${{ github.event_name == 'push' && 'development' || inputs.environment }}"
          case "$ENV" in
            development) SITE="dev-cul.atlassian.net" ;;
            staging)     SITE="sta-cul.atlassian.net" ;;
            production)  SITE="cul.atlassian.net" ;;
          esac
          npx @forge/cli@12 deploy --non-interactive -e "$ENV"
          npx @forge/cli@12 install --non-interactive --upgrade --site "$SITE" --product confluence -e "$ENV"
