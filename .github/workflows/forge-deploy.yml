name: Forge Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'e2e/**'
      - 'icon/**'
      - 'manifest.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.mjs'
      - 'vitest.config.js'
      - '.github/workflows/forge-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - development
          - staging
          - production

concurrency:
  group: forge-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

env:
  FORGE_CLI: '@forge/cli@12'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
      - run: npx ${{ env.FORGE_CLI }} settings set usage-analytics true
      - name: Forge lint
        run: npx ${{ env.FORGE_CLI }} lint
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}

  deploy:
    needs: test
    uses: culmat/forge-ci/.github/workflows/forge-deploy.yml@main
    with:
      target-environment: ${{ github.event_name == 'push' && 'development' || inputs.environment }}
      site-development: dev-cul.atlassian.net
      site-staging: sta-cul.atlassian.net
      site-production: cul.atlassian.net
    secrets:
      FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
      FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
