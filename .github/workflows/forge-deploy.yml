name: Forge Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'e2e/**'
      - 'icon/**'
      - 'manifest.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.mjs'
      - 'vitest.config.js'
      - '.github/workflows/forge-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - development
          - staging
          - production

concurrency:
  group: forge-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  deploy:
    permissions:
      contents: write
    uses: culmat/forge-ci/.github/workflows/forge-deploy.yml@main
    with:
      target-environment: ${{ github.event_name == 'push' && 'development' || inputs.environment }}
      site-development: dev-cul.atlassian.net
      site-staging: sta-cul.atlassian.net
      site-production: cul.atlassian.net
      pre-build-command: node scripts/write-build-info.mjs && npm run lint && npm run format:check && npx vitest run --coverage
      # After each successful deploy, write the assigned Forge version to the
      # per-env `LATEST_VERSION` variable (backport-safe). The About tab's
      # getVersionInfo resolver reads this to flag older-major installs.
      maintain-latest-version: true
    secrets:
      FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
      FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
