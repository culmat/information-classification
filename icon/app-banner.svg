<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Atlassian Marketplace banner — 1120 × 548.

  Guidance from Atlassian (Building your presence on Marketplace):
    - Required size: 1120×548 (high-res) or 560×274 (standard).
    - Should feature the app name, partner name, and a brief
      functionality description.

  Design choices:
    - Off-white background (#FAFBFC) keeps the focus on the app icon
      and title, and avoids clashing with Atlassian's own chrome on
      listing pages.
    - The app icon is inlined as a <symbol> so this file is
      self-contained — no runtime dependency on app-icon.svg or
      app-icon.png. Scales to any resolution without loss.
    - The four-colour strip across the bottom (green / yellow / orange
      / red) is the product's own brand motif — it mirrors the four
      classification levels shown in the icon's folder tabs, so the
      banner reads as the same product family at a glance.
    - Typography: Helvetica → Arial → sans-serif. Avoids a web-font
      dependency so the banner renders identically in any SVG viewer
      or PNG exporter.
-->
<svg
  viewBox="0 0 1120 548"
  width="1120"
  height="548"
  xmlns="http://www.w3.org/2000/svg">

  <!-- Off-white background — kept as the first drawn element so it sits
       behind everything else. -->
  <rect width="1120" height="548" fill="#FAFBFC" />

  <!-- ====================================================================
       Icon — inlined from icon/app-icon.svg.

       We don't use <symbol>+<use> here because not every SVG renderer
       (notably ImageMagick via RSVG) follows that reference chain. An
       inline <g> with a composite transform keeps the banner rendering
       consistently across renderers.

       Math: the icon is drawn in a 144×144 viewBox. We want it 300×300
       at (80, 120) on the 1120×548 banner. scale = 300/144 ≈ 2.0833.
       ==================================================================== -->
