  <!-- ====================================================================
       Composition
       ==================================================================== -->

  <!-- Thin vertical divider between icon and text — a neutral grey so
       it reads as "separator" not "border". -->
  <line x1="410" y1="160" x2="410" y2="380" stroke="#DFE1E6" stroke-width="2" />

  <!-- App name: the primary title, in near-black for maximum contrast
       against the off-white background. -->
  <text
    x="450" y="230"
    font-family="Helvetica, Arial, sans-serif"
    font-size="60"
    font-weight="700"
    fill="#172B4D">Information Classification</text>

  <!-- Secondary line: identifies the host product. -->
  <text
    x="450" y="282"
    font-family="Helvetica, Arial, sans-serif"
    font-size="34"
    font-weight="400"
    fill="#42526E">for Confluence</text>

  <!-- Functional description — one sentence, stays legible at the
       standard-res 560×274 crop too. -->
  <text
    x="450" y="350"
    font-family="Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="400"
    fill="#42526E">Classify pages. Flag restriction gaps. Audit the trail.</text>

  <!-- Partner byline: small, in the bottom-right corner, muted colour
       so it doesn't compete with the title. -->
  <text
    x="1040" y="500"
    font-family="Helvetica, Arial, sans-serif"
    font-size="18"
    font-weight="400"
    fill="#6B778C"
    text-anchor="end">by Matthias Cullmann</text>

  <!-- Classification-level strip across the bottom. Echoes the icon's
       folder-tab colours and signals the product's domain at a glance.
       Public → Internal → Confidential → Secret, left to right. -->
  <rect x="0"    y="540" width="280" height="8" fill="#87c37c" />
  <rect x="280"  y="540" width="280" height="8" fill="#f9c84e" />
  <rect x="560"  y="540" width="280" height="8" fill="#e8804b" />
  <rect x="840"  y="540" width="280" height="8" fill="#c85248" />
</svg>
